<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电解铝氧化铝浓度在线检测与槽控优化系统</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Microsoft YaHei','Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;}
.header{background:linear-gradient(135deg,#0f3460,#16213e);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #0f3460;flex-shrink:0;min-height:56px;}
.header h1{font-size:20px;color:#e94560;text-shadow:0 0 10px rgba(233,69,96,0.3);letter-spacing:2px;}
.header-stats{display:flex;gap:20px;align-items:center;}
.stat-item{text-align:center;}
.stat-item .label{font-size:11px;color:#8888aa;margin-bottom:2px;}
.stat-item .value{font-size:18px;font-weight:bold;}
.stat-item .value.green{color:#4CAF50;}
.stat-item .value.yellow{color:#FFC107;}
.stat-item .value.orange{color:#FF9800;}
.stat-item .value.red{color:#F44336;}
.header-time{font-size:14px;color:#8888aa;font-variant-numeric:tabular-nums;}
.main{display:flex;flex:1;overflow:hidden;}
.canvas-area{flex:1;position:relative;display:flex;flex-direction:column;overflow:hidden;}
.canvas-wrapper{flex:1;overflow:auto;padding:10px;display:flex;justify-content:center;align-items:flex-start;}
canvas#workshop{border-radius:8px;background:#12122a;box-shadow:0 0 20px rgba(0,0,0,0.5);}
.legend{display:flex;gap:16px;justify-content:center;padding:8px;background:#16213e;border-top:1px solid #0f3460;flex-shrink:0;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;}
.legend-color{width:16px;height:12px;border-radius:3px;}
.alarm-panel{width:320px;background:#16213e;border-left:2px solid #0f3460;display:flex;flex-direction:column;flex-shrink:0;}
.alarm-header{padding:12px 16px;font-size:15px;font-weight:bold;border-bottom:1px solid #0f3460;display:flex;align-items:center;justify-content:space-between;}
.alarm-header .badge{background:#e94560;color:#fff;border-radius:10px;padding:2px 8px;font-size:12px;}
.alarm-list{flex:1;overflow-y:auto;padding:8px;}
.alarm-item{padding:10px 12px;margin-bottom:6px;border-radius:6px;cursor:pointer;transition:background 0.2s;border-left:3px solid transparent;}
.alarm-item:hover{background:rgba(255,255,255,0.05);}
.alarm-item.level1{border-left-color:#FF9800;background:rgba(255,152,0,0.08);}
.alarm-item.level2{border-left-color:#F44336;background:rgba(244,67,54,0.08);}
.alarm-item.level2 .alarm-icon{animation:flash-icon 0.8s infinite;}
.alarm-item .alarm-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.alarm-icon{font-size:16px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.alarm-icon.l1{background:rgba(255,152,0,0.2);color:#FF9800;}
.alarm-icon.l2{background:rgba(244,67,54,0.2);color:#F44336;}
.alarm-pot{font-weight:bold;font-size:13px;}
.alarm-type{font-size:11px;color:#aaa;margin-left:auto;}
.alarm-msg{font-size:12px;color:#ccc;margin-left:32px;}
.alarm-time{font-size:11px;color:#666;margin-left:32px;margin-top:2px;}
.alarm-empty{text-align:center;color:#555;padding:40px 10px;font-size:13px;}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:1000;display:none;justify-content:center;align-items:center;}
.modal-overlay.active{display:flex;}
.modal{background:#1a1a2e;border:1px solid #0f3460;border-radius:12px;width:820px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.modal-header{padding:16px 20px;border-bottom:1px solid #0f3460;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#1a1a2e;z-index:1;border-radius:12px 12px 0 0;}
.modal-header h2{font-size:16px;}
.modal-close{background:none;border:1px solid #444;color:#aaa;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.modal-close:hover{background:#e94560;color:#fff;border-color:#e94560;}
.modal-body{padding:16px 20px;}
.modal-info{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.info-card{background:#16213e;padding:12px;border-radius:8px;text-align:center;}
.info-card .info-label{font-size:11px;color:#8888aa;margin-bottom:4px;}
.info-card .info-value{font-size:20px;font-weight:bold;}
.info-card .info-value.green{color:#4CAF50;}
.info-card .info-value.yellow{color:#FFC107;}
.info-card .info-value.orange{color:#FF9800;}
.info-card .info-value.red{color:#F44336;}
.chart-section{margin-bottom:16px;}
.chart-title{font-size:13px;color:#8888aa;margin-bottom:8px;padding-left:4px;}
.chart-container{background:#12122a;border-radius:8px;padding:8px;}
.chart-container canvas{width:100%!important;height:200px!important;}
.feedings-table{width:100%;border-collapse:collapse;font-size:12px;}
.feedings-table th{background:#0f3460;padding:8px 10px;text-align:left;color:#8888aa;font-weight:normal;border-bottom:1px solid #1a3a6e;}
.feedings-table td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.04);}
.feedings-table tr:hover td{background:rgba(255,255,255,0.02);}
@keyframes flash-icon{0%,100%{opacity:1;}50%{opacity:0.3;}}
@keyframes pulse-border{0%,100%{border-color:rgba(244,67,54,0.3);}50%{border-color:rgba(244,67,54,1);}}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#1a1a2e;}
::-webkit-scrollbar-thumb{background:#0f3460;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#1a4a80;}
</style>
</head>
<body>

<div class="header">
  <h1>电解铝氧化铝浓度在线检测与槽控优化系统</h1>
  <div class="header-stats">
    <div class="stat-item"><div class="label">总槽数</div><div class="value" id="statTotal">200</div></div>
    <div class="stat-item"><div class="label">正常</div><div class="value green" id="statNormal">0</div></div>
    <div class="stat-item"><div class="label">偏低</div><div class="value yellow" id="statLow">0</div></div>
    <div class="stat-item"><div class="label">极低</div><div class="value orange" id="statVeryLow">0</div></div>
    <div class="stat-item"><div class="label">危险</div><div class="value red" id="statCritical">0</div></div>
    <div class="stat-item"><div class="label">活跃报警</div><div class="value red" id="statAlarms">0</div></div>
  </div>
  <div class="header-time" id="headerTime">--</div>
</div>

<div class="main">
  <div class="canvas-area">
    <div class="canvas-wrapper">
      <canvas id="workshop"></canvas>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-color" style="background:#4CAF50;"></div>正常 (≥2.5%)</div>
      <div class="legend-item"><div class="legend-color" style="background:#FFC107;"></div>偏低 (1.8%-2.5%)</div>
      <div class="legend-item"><div class="legend-color" style="background:#FF9800;"></div>极低 (1.5%-1.8%)</div>
      <div class="legend-item"><div class="legend-color" style="background:#F44336;"></div>危险 (&lt;1.5%)</div>
      <div class="legend-item"><div class="legend-color" style="border:2px solid #F44336;background:transparent;animation:flash-icon 0.8s infinite;"></div>阳极效应预警 (&gt;80%)</div>
    </div>
  </div>

  <div class="alarm-panel">
    <div class="alarm-header">
      <span>实时报警</span>
      <span class="badge" id="alarmCount">0</span>
    </div>
    <div class="alarm-list" id="alarmList">
      <div class="alarm-empty">暂无活跃报警</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">槽详情</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-info" id="modalInfo"></div>
      <div class="chart-section">
        <div class="chart-title">电压趋势 (近8小时)</div>
        <div class="chart-container"><canvas id="voltageChart"></canvas></div>
      </div>
      <div class="chart-section">
        <div class="chart-title">阳极电流分布 (近8小时)</div>
        <div class="chart-container"><canvas id="currentChart"></canvas></div>
      </div>
      <div class="chart-section">
        <div class="chart-title">最近10次下料记录</div>
        <table class="feedings-table">
          <thead><tr><th>下料时间</th><th>下料量(kg)</th><th>下料类型</th><th>操作员</th></tr></thead>
          <tbody id="feedingsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="js/potline_view.js"></script>
<script src="js/pot_detail.js"></script>
<script>
(function(){
  var alarms = [];

  function addAlarm(alarm){
    alarms.unshift(alarm);
    renderAlarms();
    playAlertSound();
  }

  function renderAlarms(){
    var list=document.getElementById('alarmList');
    document.getElementById('alarmCount').textContent=alarms.length;
    document.getElementById('statAlarms').textContent=alarms.length;
    if(alarms.length===0){
      list.innerHTML='<div class="alarm-empty">暂无活跃报警</div>';
      return;
    }
    list.innerHTML='';
    alarms.forEach(function(a){
      var div=document.createElement('div');
      div.className='alarm-item level'+a.level;
      var t=a.time instanceof Date?a.time:new Date(a.time);
      var ts=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');
      div.innerHTML=
        '<div class="alarm-top">'+
          '<div class="alarm-icon l'+a.level+'">&#9888;</div>'+
          '<span class="alarm-pot">'+a.potCode+'</span>'+
          '<span class="alarm-type">'+a.alarmType+'</span>'+
        '</div>'+
        '<div class="alarm-msg">'+a.message+'</div>'+
        '<div class="alarm-time">'+ts+'</div>';
      div.addEventListener('click',function(){
        var pot=PotLineView.getPots().find(function(p){return p.code===a.potCode;});
        if(pot) PotLineView.setHighlight(pot.id);
      });
      list.appendChild(div);
    });
  }

  function playAlertSound(){
    try{
      var ac=new(window.AudioContext||window.webkitAudioContext)();
      var osc=ac.createOscillator();
      var gain=ac.createGain();
      osc.connect(gain);gain.connect(ac.destination);
      osc.frequency.value=880;osc.type='sine';
      gain.gain.setValueAtTime(0.15,ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.5);
      osc.start(ac.currentTime);osc.stop(ac.currentTime+0.5);
    }catch(e){}
  }

  function handleAlarm(alarmId){
    fetch('/api/potdata/alarms/'+alarmId+'/handle',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({handlerName:'WebUser'})
    }).then(function(){
      alarms=alarms.filter(function(a){return a.id!==alarmId;});
      renderAlarms();
    }).catch(function(){});
  }

  function initSignalR(){
    try{
      var conn=new signalR.HubConnectionBuilder().withUrl('/hubs/pot-monitor').withAutomaticReconnect().build();
      conn.on('PotStatusUpdated',function(statusList){
        PotLineView.updatePotsFromStatus(statusList);
      });
      conn.on('AlarmTriggered',function(alarm){
        addAlarm({
          id:alarm.id, level:alarm.alarmLevel, potCode:alarm.potCode,
          alarmType:alarm.alarmType, message:alarm.message, time:alarm.createdAt
        });
      });
      conn.on('AnodeEffectWarning',function(data){
        var pot=PotLineView.getPots().find(function(p){return p.id===data.potId;});
        if(pot) pot.effectProb=(data.probability||0.85)*100;
      });
      conn.start().catch(function(e){console.warn('SignalR连接失败:',e);});
    }catch(e){console.warn('SignalR初始化失败:',e);}
  }

  function fetchInitialData(){
    fetch('/api/potdata/status').then(function(r){return r.json();}).then(function(data){
      PotLineView.updatePotsFromStatus(data);
    }).catch(function(){});
  }

  function updateClock(){
    var now=new Date();
    document.getElementById('headerTime').textContent=
      now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+
      String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  }

  window.addEventListener('load',function(){
    PotDetail.init();
    PotLineView.init(function(pot){
      PotDetail.open(pot);
    });
    fetchInitialData();
    initSignalR();
    updateClock();
    setInterval(updateClock,1000);
    PotLineView.simulateData(addAlarm);
  });
})();
</script>
</body>
</html>
